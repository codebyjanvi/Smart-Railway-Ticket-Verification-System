<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cancel Ticket — Indian Railways</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root {
  --ir-navy:#0A1628;
  --ir-blue:#1B4F9E;
  --ir-blue-bright:#2563EB;
  --ir-blue-light:#DBEAFE;
  --ir-saffron:#D97706;
  --ir-green:#059669;
  --ir-red:#DC2626;
  --ir-slate:#64748B;
  --ir-slate-dark:#334155;

  --font-primary:'IBM Plex Sans',Arial,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:var(--font-primary);
    background:#F1F5F9;
    color:var(--ir-slate-dark);
    min-height:100vh;
}

/* HEADER */
.sys-header{
    background:var(--ir-navy);
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 35px;
    border-bottom:3px solid var(--ir-saffron);
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.brand{
    color:white;
    font-size:18px;
    font-weight:600;
    letter-spacing:.05em;
}

/* MAIN */
.main{
    display:flex;
    justify-content:center;
    align-items:center;
    padding:60px 20px;
}

/* CARD */
.card{
    width:420px;
    background:white;
    border:1px solid #E2E8F0;
    border-radius:14px;
    padding:32px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    animation:fadeIn .8s ease;
}

/* TITLE */
.title{
    text-align:center;
    margin-bottom:25px;
}

.title h2{
    color:var(--ir-navy);
    font-size:24px;
    margin-bottom:5px;
}

.title p{
    font-size:12px;
    color:var(--ir-slate);
}

/* LABEL */
.label{
    display:block;
    font-size:11px;
    font-weight:600;
    color:var(--ir-slate);
    letter-spacing:.06em;
    text-transform:uppercase;
    margin-bottom:6px;
}

/* INPUT */
input{
    width:100%;
    padding:12px 14px;
    border-radius:10px;
    border:1px solid #CBD5E1;
    outline:none;
    font-size:14px;
    font-family:var(--font-primary);
    transition:.2s;
}

input:focus{
    border-color:var(--ir-blue-bright);
    box-shadow:0 0 0 3px rgba(37,99,235,.12);
}

/* BUTTON */
button{
    width:100%;
    padding:13px;
    margin-top:18px;
    border:none;
    border-radius:10px;
    background:var(--ir-red);
    color:white;
    font-size:14px;
    font-weight:600;
    cursor:pointer;
    transition:.2s;
}

button:hover{
    background:#B91C1C;
    transform:translateY(-2px);
}

/* MESSAGE */
#msg{
    margin-top:18px;
    padding:14px;
    border-radius:10px;
    font-size:13px;
    text-align:center;
    display:none;
    animation:fadeIn .4s ease;
}

/* SUCCESS */
.success{
    background:#DCFCE7;
    color:#166534;
    border:1px solid #BBF7D0;
}

/* ERROR */
.error{
    background:#FEE2E2;
    color:#991B1B;
    border:1px solid #FECACA;
}

/* FOOTER */
.footer{
    margin-top:30px;
    text-align:center;
    font-size:11px;
    color:var(--ir-slate);
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(18px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* RESPONSIVE */
@media(max-width:600px){

    .card{
        width:100%;
    }

    .sys-header{
        padding:0 20px;
    }

    .brand{
        font-size:15px;
    }
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="sys-header">

    <div class="brand">
        🚆 Indian Railways Digital Services
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="card">

        <div class="title">
            <h2>Cancel Ticket</h2>
            <p>Secure QR Linked Ticket Cancellation Portal</p>
        </div>

        <label class="label">Ticket ID</label>

        <input id="ticket" placeholder="Enter Ticket ID">

        <button onclick="cancelTicket()">
            Cancel Ticket
        </button>

        <div id="msg"></div>

        <div class="footer">
            Ministry of Railways · Secure Cancellation Gateway
        </div>

    </div>

</div>

<script>

function cancelTicket(){

    let ticketId = document.getElementById("ticket").value.trim();

    if(!ticketId){

        alert("Please enter Ticket ID");
        return;
    }

    fetch("/cancel_ticket",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({
            ticket: ticketId
        })

    })

    .then(r => r.json())

    .then(d => {

        let msg = document.getElementById("msg");

        msg.style.display = "block";

        // SUCCESS
        if(d.message && d.message.includes("✅")){

            msg.className = "success";

            msg.innerHTML = `
                <strong>Cancellation Successful</strong>
                <br><br>
                ${d.message}
            `;
        }

        // ERROR
        else{

            msg.className = "error";

            msg.innerHTML = `
                <strong>Cancellation Failed</strong>
                <br><br>
                ${d.message || "Unable to cancel ticket"}
            `;
        }

        // SMS popup
        alert("📩 SMS Notification: " + d.message);

    })

    .catch(() => {

        let msg = document.getElementById("msg");

        msg.style.display = "block";

        msg.className = "error";

        msg.innerHTML = `
            <strong>Server Error</strong>
            <br><br>
            Please try again later
        `;
    });
}

</script>

</body>
</html>
