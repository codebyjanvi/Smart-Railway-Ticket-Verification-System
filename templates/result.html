<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verification Result — Indian Railways</title>

<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>

:root {
  --ir-navy:#0A1628;
  --ir-blue:#1B4F9E;
  --ir-blue-bright:#2563EB;
  --ir-blue-light:#DBEAFE;
  --ir-saffron:#D97706;
  --ir-green:#059669;
  --ir-red:#DC2626;
  --ir-slate:#64748B;
  --ir-slate-dark:#334155;

  --font-primary:'IBM Plex Sans',Arial,sans-serif;
  --font-mono:'IBM Plex Mono',monospace;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:var(--font-primary);
    background:#F1F5F9;
    color:var(--ir-slate-dark);
    min-height:100vh;
}

/* HEADER */
.sys-header{
    background:var(--ir-navy);
    height:60px;
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:0 35px;
    border-bottom:3px solid var(--ir-saffron);
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

.brand{
    color:white;
    font-size:18px;
    font-weight:600;
    letter-spacing:.05em;
}

/* MAIN */
.main{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:calc(100vh - 60px);
    padding:20px;
}

/* CARD */
.card{
    width:420px;
    background:white;
    border:1px solid #E2E8F0;
    border-radius:14px;
    padding:35px;
    box-shadow:0 6px 18px rgba(0,0,0,0.08);
    animation:fadeIn .8s ease;
}

/* TITLE */
.title{
    text-align:center;
    margin-bottom:25px;
}

.title h2{
    color:var(--ir-navy);
    font-size:25px;
    margin-bottom:6px;
}

.title p{
    font-size:12px;
    color:var(--ir-slate);
}

/* RESULT BOX */
.result-box{
    padding:20px;
    border-radius:12px;
    text-align:center;
    margin-top:15px;
    font-size:15px;
    line-height:1.8;
    font-weight:500;
    border:1px solid #E2E8F0;
}

/* VALID */
.valid{
    background:#DCFCE7;
    border-color:#BBF7D0;
    color:#166534;
}

/* FRAUD */
.fraud{
    background:#FEE2E2;
    border-color:#FECACA;
    color:#991B1B;
}

/* INVALID */
.invalid{
    background:#FEF3C7;
    border-color:#FDE68A;
    color:#92400E;
}

/* SECTION TITLE */
.section-title{
    margin-top:25px;
    margin-bottom:12px;
    font-size:14px;
    color:var(--ir-navy);
    font-weight:600;
}

/* STATS BOX */
.stats-box{
    background:#F8FAFC;
    border:1px solid #E2E8F0;
    border-radius:12px;
    padding:16px;
    font-size:13px;
    color:var(--ir-slate-dark);
    line-height:1.8;
}

/* FOOTER */
.footer{
    margin-top:20px;
    text-align:center;
    font-size:11px;
    color:var(--ir-slate);
}

/* ANIMATION */
@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(18px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* MOBILE */
@media(max-width:500px){

    .card{
        width:100%;
        padding:28px 22px;
    }

    .sys-header{
        padding:0 18px;
    }

    .brand{
        font-size:15px;
    }
}

</style>

</head>

<body>

<!-- HEADER -->
<div class="sys-header">

    <div class="brand">
        🚆 Indian Railways Verification System
    </div>

</div>

<!-- MAIN -->
<div class="main">

    <div class="card">

        <div class="title">

            <h2>Verification Result</h2>

            <p>AI Powered Smart Ticket Validation</p>

        </div>

        <!-- RESULT -->
        <div id="result" class="result-box">
            Checking Ticket...
        </div>

        <!-- BOGIE STATUS -->
        <div class="section-title">
            📊 Bogie Crowd Status
        </div>

        <div id="bogieStats" class="stats-box">
            Loading occupancy details...
        </div>

        <!-- FOOTER -->
        <div class="footer">
            Ministry of Railways · SmartRail Secure Verification Engine
        </div>

    </div>

</div>

<script>

let data = JSON.parse(localStorage.getItem("result"));

let resultBox = document.getElementById("result");

/* VALID */
if(data.status === "valid"){

    resultBox.classList.add("valid");

    resultBox.innerHTML = `
        <h3>✅ Valid Ticket</h3>
        <br>
        <strong>Name:</strong> ${data.name}
        <br>
        <strong>Seat:</strong> ${data.seat}
    `;
}

/* FRAUD */
else if(data.status === "fraud"){

    resultBox.classList.add("fraud");

    resultBox.innerHTML = `
        <h3>🚨 Fraud Detected</h3>
        <br>
        Unauthorized Passenger Activity
        <br><br>
        <strong>Fine:</strong> ₹${data.fine}
    `;
}

/* INVALID */
else{

    resultBox.classList.add("invalid");

    resultBox.innerHTML = `
        <h3>❌ Invalid Ticket</h3>
        <br>
        Ticket Record Not Found
        <br><br>
        <strong>Penalty:</strong> ₹${data.fine}
    `;
}

/* OPTIONAL BOGIE STATS */
document.getElementById("bogieStats").innerHTML = `
    Current occupancy monitoring enabled.
    <br>
    Real-time analytics connected successfully.
`;

</script>

</body>
</html>
