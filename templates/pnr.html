<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SmartRail PNR Status</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    height:100vh;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#050816;
    position:relative;
}

/* ANIMATED BACKGROUND */

.bg{
    position:absolute;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at top left,#1d4ed8 0%,transparent 30%),
    radial-gradient(circle at bottom right,#0ea5e9 0%,transparent 30%),
    linear-gradient(135deg,#020617,#0f172a,#111827);
    z-index:-3;
}

.train-line{
    position:absolute;
    width:200%;
    height:2px;
    background:rgba(255,255,255,0.1);
    top:20%;
    left:-50%;
    animation:moveLine 8s linear infinite;
}

.train-line:nth-child(2){
    top:70%;
    animation-duration:12s;
}

@keyframes moveLine{
    from{
        transform:translateX(0);
    }
    to{
        transform:translateX(25%);
    }
}

/* MAIN CARD */

.card{
    width:430px;
    padding:35px;
    border-radius:30px;
    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.12);
    backdrop-filter:blur(18px);
    box-shadow:
    0 20px 50px rgba(0,0,0,0.5),
    inset 0 0 30px rgba(255,255,255,0.03);
    animation:fadeIn 1s ease;
}

/* HEADER */

.logo{
    width:80px;
    height:80px;
    margin:auto;
    margin-bottom:20px;
    border-radius:20px;
    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    display:flex;
    justify-content:center;
    align-items:center;
    font-size:38px;
    box-shadow:0 10px 30px rgba(37,99,235,0.4);
}

h1{
    text-align:center;
    color:white;
    font-size:28px;
    margin-bottom:10px;
    font-weight:600;
}

.subtitle{
    text-align:center;
    color:#94a3b8;
    font-size:14px;
    margin-bottom:30px;
}

/* INPUT */

.input-box{
    position:relative;
    margin-bottom:20px;
}

.input-box input{
    width:100%;
    padding:16px 18px;
    border:none;
    outline:none;
    border-radius:16px;
    background:rgba(255,255,255,0.08);
    color:white;
    font-size:16px;
    border:1px solid rgba(255,255,255,0.08);
    transition:0.3s;
}

.input-box input:focus{
    border-color:#3b82f6;
    box-shadow:0 0 15px rgba(59,130,246,0.3);
}

.input-box input::placeholder{
    color:#94a3b8;
}

/* BUTTON */

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:16px;
    background:linear-gradient(135deg,#2563eb,#0ea5e9);
    color:white;
    font-size:17px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    box-shadow:0 10px 30px rgba(37,99,235,0.35);
}

button:hover{
    transform:translateY(-2px) scale(1.01);
    box-shadow:0 15px 35px rgba(37,99,235,0.5);
}

/* RESULT */

#res{
    margin-top:25px;
}

/* SUCCESS CARD */

.ticket{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.08);
    border-radius:22px;
    padding:22px;
    animation:fadeIn 0.5s ease;
}

.ticket-top{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.ticket-top h2{
    color:white;
    font-size:22px;
}

.status{
    padding:8px 14px;
    border-radius:50px;
    background:#16a34a;
    color:white;
    font-size:13px;
    font-weight:600;
}

.row{
    display:flex;
    justify-content:space-between;
    margin-bottom:14px;
    padding-bottom:12px;
    border-bottom:1px solid rgba(255,255,255,0.06);
}

.label{
    color:#94a3b8;
    font-size:14px;
}

.value{
    color:white;
    font-weight:500;
}

/* ERROR */

.error-box{
    padding:20px;
    border-radius:18px;
    background:rgba(239,68,68,0.12);
    border:1px solid rgba(239,68,68,0.3);
    color:#f87171;
    text-align:center;
    animation:fadeIn 0.5s ease;
}

/* ANIMATION */

@keyframes fadeIn{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>

<body>

<div class="bg"></div>

<div class="train-line"></div>
<div class="train-line"></div>

<div class="card">

<div class="logo">
🚆
</div>

<h1>PNR Status Check</h1>

<p class="subtitle">
Smart Railway Ticket Verification System
</p>

<div class="input-box">

<input
type="text"
id="pnr"
placeholder="Enter 10 Digit PNR Number"
maxlength="10">

</div>

<button onclick="checkPNR()">
Check Ticket Status
</button>

<div id="res"></div>

</div>

<script>

function checkPNR(){

let value = document.getElementById("pnr").value.trim();

if(!value){

    alert("Please Enter PNR Number");

    return;
}

document.getElementById("res").innerHTML = `

<div style="text-align:center; margin-top:20px; color:#93c5fd;">
Checking Ticket...
</div>

`;

fetch("/check_pnr",{

method:"POST",

headers:{
    "Content-Type":"application/json"
},

body:JSON.stringify({
    pnr:value
})

})

.then(res => res.json())

.then(data => {

    let result = document.getElementById("res");

    if(data.error){

        result.innerHTML = `

        <div class="error-box">

            <h2>❌ Invalid PNR</h2>

            <p style="margin-top:10px;">
                Ticket Not Found In Database
            </p>

        </div>

        `;

    }

    else{

        result.innerHTML = `

        <div class="ticket">

            <div class="ticket-top">

                <h2>🎫 Ticket Confirmed</h2>

                <div class="status">
                    VERIFIED
                </div>

            </div>

            <div class="row">
                <div class="label">Passenger</div>
                <div class="value">${data.name}</div>
            </div>

            <div class="row">
                <div class="label">From</div>
                <div class="value">${data.source}</div>
            </div>

            <div class="row">
                <div class="label">Destination</div>
                <div class="value">${data.destination}</div>
            </div>

            <div class="row">
                <div class="label">Travel Date</div>
                <div class="value">${data.date}</div>
            </div>

            <div class="row">
                <div class="label">Seat Type</div>
                <div class="value">${data.seat}</div>
            </div>

            <div class="row">
                <div class="label">Bogie</div>
                <div class="value">${data.bogie}</div>
            </div>

            <div class="row" style="border:none; margin-bottom:0;">

                <div class="label">PNR</div>

                <div class="value">
                    ${value}
                </div>

            </div>

        </div>

        `;
    }

})

.catch(err => {

    console.log(err);

    document.getElementById("res").innerHTML = `

    <div class="error-box">

        <h2>⚠ Server Error</h2>

        <p style="margin-top:10px;">
            Unable to connect to server
        </p>

    </div>

    `;

});

}

</script>

</body>
</html>
