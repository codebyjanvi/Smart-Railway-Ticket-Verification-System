<!DOCTYPE html>
<html>
<head>
<script src="https://unpkg.com/html5-qrcode"></script>
<title>TTE Verification</title>

<style>
body {
    font-family: Arial;
    text-align: center;
    background: #f4f6f9;
}

.card {
    background: white;
    padding: 20px;
    margin: 50px auto;
    width: 350px;
    border-radius: 10px;
}

/* hidden sections */
#faceSection, #resultSection, #paymentBox {
    display:none;
}

.valid { color: green; }
.fraud { color: red; }
</style>
</head>

<body>

<div class="card">

<h2>🎫 Step 1: Scan Ticket</h2>

<div id="reader" style="width:300px;margin:auto;"></div>

<h3 id="ticketDisplay"></h3>

<!-- RESULT -->
<div id="resultSection">
    <div id="result"></div>
</div>
</div>

<audio id="alarm" src="/static/alert.mp3"></audio>

<script>

let scanner = new Html5QrcodeScanner(
    "reader",
    {
        fps: 10,
        qrbox: 250
    }
);

function onScanSuccess(decodedText){

    let ticketID;

    // extract ticket id from URL
    if(decodedText.includes("/")){

        let parts = decodedText.split("/");

        ticketID = parts[parts.length - 1];

    }else{

        ticketID = decodedText;

    }

    document.getElementById("ticketDisplay").innerHTML =
        "✅ Ticket Scanned: " + ticketID;

    // stop scanner
    scanner.clear();

    // redirect to verification page
    window.location.href = "/scan/" + ticketID;
}

scanner.render(onScanSuccess);



// VERIFY FUNCTION
function verify(){

    let canvas = document.createElement("canvas");
    canvas.width = 640;
    canvas.height = 480;

    canvas.getContext("2d").drawImage(video,0,0,640,480);

    fetch("/verify_ticket",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
            ticket: ticketID,
            face: canvas.toDataURL()
        })
    })
    .then(r=>r.json())
    .then(data=>{

        document.getElementById("resultSection").style.display = "block";

        let result = document.getElementById("result");

        // ✅ VALID
        if(data.status === "valid"){
            result.innerHTML = `
                <h3 class="valid">✅ Valid Ticket</h3>
                Name: ${data.name}<br>
                Seat: ${data.seat}
            `;
        }

        // 🚨 FRAUD
        else if(data.status === "fraud"){
            document.getElementById("alarm").play();

            result.innerHTML = `
                <h3 class="fraud">🚨 FRAUD</h3>
                ${data.message}<br>
                Fine: ₹${data.fine}
            `;

            // SHOW PAYMENT
            fetch("/generate_fine_qr", {
                method:"POST",
                headers:{"Content-Type":"application/json"},
                body:JSON.stringify({ amount: data.fine })
            })
            .then(r=>r.json())
            .then(qr=>{
                document.getElementById("paymentBox").style.display = "block";
                document.getElementById("fineAmount").innerText = "₹" + qr.amount;
                document.getElementById("fineQR").src = qr.qr;
            });
        }

        // ❌ INVALID
        else{
            result.innerHTML = `
                <h3 class="fraud">❌ Invalid Ticket</h3>
                Fine: ₹${data.fine}
            `;
        }

    });
}

// PAYMENT
function markPaid(){
    alert("✅ Fine Paid");
    location.reload(); // reset system
}

</script>

</body>
</html>
